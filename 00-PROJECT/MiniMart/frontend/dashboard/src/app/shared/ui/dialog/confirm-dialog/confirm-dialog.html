<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  {{ data.description }}
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton="filled" mat-dialog-close="false">
    {{ data.cancelText ?? 'Hủy' }}
  </button>
  <button mat-button color="warn" mat-dialog-close="true">
    {{ data.confirmText ?? 'Xác nhận' }}
  </button>
</mat-dialog-actions>
