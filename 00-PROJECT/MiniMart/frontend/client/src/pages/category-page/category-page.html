<main>
  <section class="bg-gray-100 px-10 py-16">
    <div class="container mx-auto">
      <div class="mb-10 flex flex-col items-center justify-center">
        <h2 class="mb-2 text-xl font-semibold lg:text-2xl">Featured Categories</h2>
        <p class="text-base leading-6 text-gray-600 dark:text-gray-400">
          Choose your necessary products from this feature categories.
        </p>
      </div>

      <!-- LOADING -->

      <div class="flex flex-wrap">
        @if (categories(); as cats) {
          @for (category of cats; track category.id) {
            <div class="h-24 w-1/6">
              <a [routerLink]="['/category', category.id]">
                <article
                  class="h-full transform cursor-pointer bg-white p-4 shadow-sm transition duration-200 ease-linear hover:shadow-lg"
                >
                  <div class="flex h-full items-center gap-4">
                    <div>
                      <img
                        [src]="category.imageUrl ?? fallbackImgs[$index % fallbackImgs.length]"
                        class="h-8 w-8"
                      />
                    </div>
                    <div>
                      <h3
                        class="text-sm leading-tight font-medium text-gray-600 hover:text-orange-400 dark:text-gray-300"
                      >
                        {{ category.name }}
                      </h3>
                    </div>
                  </div>
                </article>
              </a>
            </div>
          }
        } @else {
          @for (i of [1, 2, 3, 4, 5, 6]; track $index) {
            <div class="h-24 w-1/6 p-2">
              <div class="h-full animate-pulse rounded-md bg-gray-100 p-4">
                <div class="flex h-full items-center gap-4">
                  <div class="h-8 w-8 rounded-full bg-gray-300"></div>
                  <div class="h-4 w-20 rounded bg-gray-300"></div>
                </div>
              </div>
            </div>
          }
        }
      </div>
    </div>
  </section>
</main>
