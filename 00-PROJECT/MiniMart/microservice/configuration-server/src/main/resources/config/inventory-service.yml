server:
    port: 8085

eureka:
    instance:
        preferIpAddress: true
    client:
        registerWithEureka: true
        fetchRegistry: true

spring:
    datasource:
        driver-class-name: org.postgresql.Driver

    jpa:
        open-in-view: false

    cloud:
        openfeign:
            circuitbreaker:
                enabled: true
        feign:
            client:
                config:
                    default:
                        connectTimeout: 5000
                        readTimeout: 10000
