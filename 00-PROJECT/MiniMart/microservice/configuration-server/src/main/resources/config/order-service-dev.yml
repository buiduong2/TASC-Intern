            defaultZone: http://localhost:8070/eureka/
        enabled: ${SERVICE_ENABLE_EUREKA:true}
        register-with-eureka: ${SERVICE_ENABLE_EUREKA:true}
        fetch-registry: ${SERVICE_ENABLE_EUREKA:true}

