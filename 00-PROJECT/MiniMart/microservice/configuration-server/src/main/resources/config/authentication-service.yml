# config/authentication-service.yml
server:
    port: 8081
    forward-headers-strategy: framework
    servlet:
        session:
            cookie:
                name: AUTHSESSION
                path: /
eureka:
    instance:
        preferIpAddress: true
    client:
        registerWithEureka: true
        fetchRegistry: true

spring:
    datasource:
        driver-class-name: org.postgresql.Driver
    jpa:
        open-in-view: false
