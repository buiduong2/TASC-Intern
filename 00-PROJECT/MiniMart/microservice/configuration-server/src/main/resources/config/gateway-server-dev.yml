eureka:
    client:
        service-url:
            defaultZone: http://localhost:8070/eureka/

custom:
    auth:
        key_set_uri: http://localhost:8081/oauth2/jwks

    client:
        origins: http://localhost:5173/,http://127.0.0.1:5500/

logging:
    level:
        org:
            springframework:
                security: DEBUG

management:
    tracing:
        sampling:
            probability: 0 # tương đương với sleuth.sampler.probability
        export:
            zipkin:
                enabled: true
                endpoint: http://localhost:9411/api/v2/spans

        exclusions:
            - '/eureka/**'
            - '/actuator/**'