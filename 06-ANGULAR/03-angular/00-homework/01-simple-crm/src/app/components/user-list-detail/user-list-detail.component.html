<div class="h-full overflow-y-auto bg-white" id="wrapper-scroll">
  <!-- header -->
  <div class="flex items-center justify-between p-4 py-2">
    <div class="flex gap-3">
      <h3 class="text-sm font-semibold">Billy Zimmer</h3>
      <p class="flex items-center gap-1 text-sm text-green-500">
        <span class="h-2 w-2 rounded-full bg-green-500"></span>
        Salaried
      </p>
    </div>
    <div class="flex">
      <button class="cursor-pointer rounded-full p-1 transition-colors hover:bg-slate-300">
        <lucide-icon [img]="PinIcon" class="-rotate-90" size="20" />
      </button>
      <button class="cursor-pointer rounded-full p-1 transition-colors hover:bg-slate-300">
        <lucide-icon [img]="XIcon" size="20" />
      </button>
    </div>
  </div>

  <!-- Detail -->

  <form method="post ">
    <!-- Top -->
    <div class="flex gap-6 px-4">
      <!-- LEFT -->
      <div class="h-32 w-32 overflow-hidden rounded border border-neutral-400">
        <img src="assets/img/kasumi.avif" alt="Avatar" class="" />
      </div>

      <!-- Right -->
      <div class="flex flex-col gap-5 text-sm">
        <div class="flex flex-col">
          <label class="text-xs text-neutral-500">Company</label>
          <input type="text" value="Braeburn" disabled class="text-blue-500" />
        </div>
        <div class="flex flex-col">
          <label class="text-xs text-neutral-500">Position</label>

          <input type="text" value="Engineer" disabled />
        </div>
        <div class="flex flex-col">
          <label class="text-xs text-neutral-500">Assigned to</label>

          <input type="text" value="Samantha Bright" disabled class="text-blue-500" />
        </div>
      </div>
    </div>

    <!-- BOttom -->
    <div class="flex flex-col gap-5 px-4 py-4 text-sm">
      <div class="flex items-center gap-3.5">
        <label>
          <lucide-icon class="text-neutral-500" size="18" [img]="PhoneIcon" />
        </label>
        <input type="text" name="phone" value="(909) 555-6939" />
      </div>
      <div class="flex items-center gap-3.5">
        <label>
          <lucide-icon class="text-neutral-500" size="18" [img]="MailIcon" />
        </label>
        <input type="email" name="email" value="williamz@dx-email.com" />
      </div>
      <div class="flex items-center gap-3.5">
        <label>
          <lucide-icon class="text-neutral-500" size="18" [img]="HouseIcon" />
        </label>
        <input type="text" name="address" value="1325 Prospect Dr" />
      </div>
    </div>

    <!-- Action -->
    <div class="border-y border-y-neutral-500 py-3">
      <div class="flex gap-3 px-4">
        <div class="flex w-2/3 gap-2">
          <button
            type="button"
            class="flex flex-1 cursor-pointer items-center justify-center gap-1 rounded border px-3 py-1 text-blue-500 transition-colors hover:bg-blue-500 hover:text-white"
          >
            <lucide-icon [img]="PenIcon" size="15" class="fill-current" />
            <span class="font-semibold uppercase">edit</span>
          </button>
          <button
            type="button"
            class="flex-1 cursor-pointer rounded border px-3 py-1 text-blue-500 transition-colors hover:bg-blue-500 hover:text-white"
          >
            <span class="font-semibold uppercase">detail</span>
          </button>
        </div>

        <div class="w-1/3">
          <button
            type="button"
            class="w-full cursor-pointer rounded border border-neutral-400 px-3 py-1 shadow transition-opacity hover:opacity-60"
          >
            <span class="font-semibold uppercase">Action</span>
          </button>
        </div>
      </div>
    </div>
  </form>

  <!-- Other Cards -->

  <div class="p-4">
    <app-ui-accordion [id]="1">
      <div class="rounded-lg border-[0.5px] border-neutral-400 text-sm shadow-sm">
        <div
          accordionTrigger
          class="flex cursor-pointer justify-between bg-neutral-100 px-3 py-2 transition-colors hover:bg-neutral-200"
        >
          <h5>Opportunities</h5>
          <button class="cursor-pointer rounded-full transition-colors hover:bg-neutral-400">
            <lucide-icon [img]="ChevronDown" />
          </button>
        </div>

        <app-ui-accordion-content>
          <ul class="p flex flex-col gap-2 px-3 py-2">
            <li>
              <span>Audio/Video Upgrade </span>
              <br />
              <span>$2,140 </span>
            </li>
            <li>
              <span>Summer Discount Offer </span>
              <br />
              <span>$2,230 </span>
            </li>
            <li>
              <span>Incoming Request for Conference Room </span>
              <br />
              <span>$5,495 </span>
            </li>
            <li>
              <span>POS Touch Screens </span>
              <br />
              <span>$2,285 </span>
            </li>
          </ul>
        </app-ui-accordion-content>
      </div>
    </app-ui-accordion>
  </div>
</div>
