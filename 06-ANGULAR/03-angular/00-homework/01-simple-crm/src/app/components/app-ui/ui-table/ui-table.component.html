<div class="relative flex h-full flex-col bg-white flex-1">

  <!-- Table Page header -->
  <div class="flex justify-between p-6">
    <!-- Left -->
    <div class="flex items-center gap-6">
      <h2 class="text-xl">Contacts</h2>

      <select name="filter" id="table-filter" class="w-14 p-2">
        <option value="All">All</option>
        <option value="Salaried">Salaried</option>
        <option value="Commission">Commission</option>
        <option value="Terminated">Terminated</option>
      </select>
    </div>

    <!-- Right -->
    <div class="flex gap-2">
      <button
        class="flex cursor-pointer items-center gap-2 rounded bg-blue-500 py-1 pr-3 pl-2 text-white hover:bg-blue-500/80"
      >
        <lucide-icon [img]="PlusIcon" size="20" />
        <span class="font-semibold uppercase"> Add Contact </span>
      </button>

      <button class="cursor-pointer rounded-full p-2 hover:bg-slate-300">
        <lucide-icon [img]="RefreshCwIcon" size="20" />
      </button>
      <button class="cursor-pointer rounded-full p-2 hover:bg-slate-300">
        <lucide-icon [img]="FileSymlinkIcon" size="20" />
      </button>
      <button class="cursor-pointer rounded-full p-2 hover:bg-slate-300">
        <lucide-icon [img]="TableIcon" size="20" />
      </button>

      <div class="flex items-center rounded border bg-slate-100 p-2 text-gray-500">
        <lucide-icon [img]="SearchIcon" />
        <input
          type="text"
          name="search-table"
          placeholder="Contact Search"
          class="pl-2 outline-0"
        />
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="flex-1 overflow-auto border border-neutral-200">
    <table class="w-full text-sm">
      <thead class="sticky top-0 z-10 bg-white">
        <tr class="border-b border-neutral-200">
          <th class="p-3 font-semibold"><input type="checkbox" name="" id="" /></th>
          <th class="p-3 font-semibold">Name</th>
          <th class="p-3 font-semibold">Company</th>
          <th class="p-3 font-semibold">Status</th>
          <th class="p-3 font-semibold">Assigned to</th>
          <th class="p-3 font-semibold">Phone</th>
          <th class="p-3 font-semibold">Email</th>
        </tr>
      </thead>

      <tbody>
        @for (d of data; track d) {
          <tr class="border-b border-neutral-200 text-center">
            <td class="p-3"><input type="checkbox" name="" id="" /></td>
            <td class="p-3">
              <span>Jackie Garmin</span>
              <span>Support Assistant</span>
            </td>
            <td class="p-3">Tom's Club</td>
            <td class="p-3">Salaried</td>
            <td class="p-3">John Heart</td>
            <td class="p-3">(213) 555-1824</td>
            <td class="p-3">
              <span>helloworldgmail.com</span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Table Page Footer -->
</div>
