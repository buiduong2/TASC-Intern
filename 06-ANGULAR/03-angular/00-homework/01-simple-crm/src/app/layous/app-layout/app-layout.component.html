<div class="grid h-screen grid-rows-[auto_1fr]">
  <header class="bg-whiteshadow min-h-20">
    <ng-content select="[layout-header]">Header</ng-content>
  </header>

  <div class="grid min-h-0 grid-cols-[auto_1fr]">
    <aside class="overflow-y-auto">
      <ng-content select="[layout-sidebar]">
        <div class="h-[3000px]">Aside (Giờ đã cuộn riêng)</div>
      </ng-content>
    </aside>

    <main class="min-h-0 overflow-y-auto">
      <ng-content select="[layout-main]">
        <div class="h-[3000px]">Main (Giờ cũng đã cuộn riêng)</div>
      </ng-content>
    </main>
  </div>
</div>

<style>
  aside,
  main {
    scrollbar-width: thin;
    scrollbar-color: #a8a8a8 #f1f1f1;
  }

  aside::-webkit-scrollbar,
  main::-webkit-scrollbar {
    width: 8px; /* Làm nhỏ đi, 8px là rất đẹp */
    height: 8px; /* Dùng cho thanh cuộn ngang (nếu có) */
  }

  aside::-webkit-scrollbar-track,
  main::-webkit-scrollbar-track {
    background: #f1f1f1; /* Màu xám rất nhạt, gần như trong suốt */
    border-radius: 4px; /* Bo góc rãnh */
  }

  aside::-webkit-scrollbar-thumb,
  main::-webkit-scrollbar-thumb {
    background: #c1c1c1; /* Màu xám của con trượt */
    border-radius: 4px; /* Bo góc con trượt */
  }

  /* 2d. Con trượt khi di chuột vào (hover) */
  aside::-webkit-scrollbar-thumb:hover,
  main::-webkit-scrollbar-thumb:hover {
    background: #a8a8a8; /* Đậm hơn một chút khi hover */
  }
</style>
